<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porter Galaxy</title>

    <!-- Tailwind compiled output -->
    <link rel="stylesheet" href="/dist/styles.css" />

    <!-- Go WASM runtime — copied from $(go env GOROOT)/misc/wasm/wasm_exec.js -->
    <script src="/wasm_exec.js"></script>

    <script>
      const go = new Go();
      WebAssembly.instantiateStreaming(fetch("/main.wasm"), go.importObject)
        .then((result) => {
          go.run(result.instance);
        })
        .catch((err) => {
          console.error("Failed to load Porter Galaxy WASM module:", err);
        });
    </script>
  </head>

  <body>
    <!-- Root mount point for the WASM renderer -->
    <div id="app">
      <!-- Canvas will be injected by the WASM module -->
    </div>

    <!-- Fallback for non-WASM browsers -->
    <noscript>
      <p class="p-8 text-center text-gray-400">
        Porter Galaxy requires JavaScript and WebAssembly support.
      </p>
    </noscript>
  </body>
</html>
